<!DOCTYPE html>
<html lang="en" spellcheck="false">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<title>Accordion App</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: #1a1a1a;
    color: #d4d4d4;
    font-family: "Courier New", Courier, "Liberation Mono", Menlo, Monaco, Consolas, monospace;
    line-height: 1.5;
    padding: 2rem 1.5rem;
    max-width: 800px;
    margin: 0 auto;
    min-height: 100vh;
  }

  /* --- Menu button (fixed top-right) --- */
  .menu-btn {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 100;
    background: none;
    border: 1px solid #444;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0.3rem 0.5rem;
    color: #999;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    line-height: 1;
  }

  .menu-btn:hover {
    color: #e8e8e8;
    border-color: #666;
    background-color: #2a2a2a;
  }

  .menu-btn:focus-visible {
    outline: 1px solid #8ab4f8;
    outline-offset: 2px;
  }

  /* --- Popup overlay --- */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background-color: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: flex-start;
    padding-top: 3rem;
  }

  .popup-overlay.is-open {
    display: flex;
  }

  .popup-box {
    background-color: #222;
    border: 1px solid #444;
    border-radius: 6px;
    width: 90%;
    max-width: 460px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    padding: 1.2rem 1rem;
  }

  .popup-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid #333;
  }

  .popup-title-row span {
    font-size: 1rem;
    font-weight: bold;
    color: #ccc;
  }

  .popup-add-btn {
    background: none;
    border: 1px dashed #555;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.3rem 0.6rem;
    color: #999;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }

  .popup-add-btn:hover {
    color: #e8e8e8;
    border-color: #777;
    background-color: #2a2a2a;
  }

  .popup-add-btn:focus-visible {
    outline: 1px solid #8ab4f8;
    outline-offset: 2px;
  }

  .popup-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    min-height: 0;
  }

  .popup-list-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.5rem;
    border-radius: 3px;
    cursor: pointer;
    transition: background-color 0.1s;
  }

  .popup-list-item:hover {
    background-color: #2a2a2a;
  }

  .popup-list-item.is-active {
    background-color: #2e2e2e;
    outline: 1px solid #444;
  }

  .popup-list-item-title {
    flex: 1;
    font-size: 0.9rem;
    color: #d0d0d0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .popup-list-item .icon-btn {
    font-size: 0.8rem;
    padding: 0.1rem 0.25rem;
  }

  .popup-empty {
    text-align: center;
    color: #666;
    padding: 1rem 0;
    font-size: 0.85rem;
  }

  /* --- Main content area (existing styles) --- */
  .main-title-area {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .main-title {
    font-size: 1.5rem;
    font-weight: bold;
    color: #e8e8e8;
    padding: 0.2rem 0;
    line-height: 1.3;
  }

  .main-title-input {
    font-size: 1.5rem;
    font-weight: bold;
    font-family: inherit;
    background: transparent;
    border: none;
    border-bottom: 1px solid #666;
    color: #e8e8e8;
    outline: none;
    padding: 0.2rem 0;
    width: 100%;
    max-width: 400px;
  }

  .main-title-input:focus {
    border-bottom-color: #8ab4f8;
  }

  .icon-btn {
    background: none;
    border: 1px solid transparent;
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem 0.35rem;
    border-radius: 3px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #999;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover {
    color: #e8e8e8;
    border-color: #555;
  }

  .icon-btn:focus-visible {
    outline: 1px solid #8ab4f8;
    outline-offset: 1px;
  }

  .accordion-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .accordion-item {
    border: 1px solid #333;
    border-radius: 4px;
    background-color: #222;
    overflow: hidden;
  }

  .accordion-header {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.55rem 0.6rem;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.12s;
  }

  .accordion-header:hover {
    background-color: #2a2a2a;
  }

  .accordion-toggle-icon {
    font-size: 0.7rem;
    width: 1rem;
    text-align: center;
    color: #777;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .accordion-header.is-open .accordion-toggle-icon {
    transform: rotate(90deg);
  }

  .accordion-title {
    flex: 1;
    font-size: 1.2rem;
    font-weight: bold;
    color: #d0d0d0;
    min-width: 0;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.35;
  }

  .accordion-title-input {
    flex: 1;
    font-size: 1.2rem;
    font-weight: bold;
    font-family: inherit;
    background: transparent;
    border: none;
    border-bottom: 1px solid #666;
    color: #d0d0d0;
    outline: none;
    padding: 0;
    min-width: 0;
  }

  .accordion-title-input:focus {
    border-bottom-color: #8ab4f8;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.1rem;
    flex-shrink: 0;
  }

  .header-actions .icon-btn {
    font-size: 0.85rem;
    padding: 0.15rem 0.3rem;
  }

  .accordion-body {
    display: none;
    border-top: 1px solid #333;
  }

  .accordion-body.is-open {
    display: block;
  }

  .accordion-title.is-note,
  .accordion-title-input.is-note {
    font-size: 0.9rem;
  }

  .accordion-body-textarea {
    width: 100%;
    min-height: 2.8em;
    padding: 0.7rem;
    font-family: inherit;
    font-size: 0.9rem;
    line-height: 1.55;
    background-color: #1e1e1e;
    color: #d4d4d4;
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    box-sizing: border-box;
  }

  .accordion-body-textarea:focus {
    background-color: #1a1a1a;
  }

  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    padding: 0.5rem 0;
  }

  .add-btn {
    font-size: 1.2rem;
    padding: 0.4rem 0.8rem;
    border: 1px dashed #555;
    border-radius: 4px;
    background: transparent;
    color: #999;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }

  .add-btn:hover {
    color: #e8e8e8;
    border-color: #777;
    background-color: #2a2a2a;
  }

  .add-btn:focus-visible {
    outline: 1px solid #8ab4f8;
    outline-offset: 2px;
  }

  .empty-state {
    text-align: center;
    color: #666;
    padding: 1.5rem 0;
    font-size: 0.9rem;
  }

  /* scrollbar styling */
  .popup-list::-webkit-scrollbar {
    width: 6px;
  }
  .popup-list::-webkit-scrollbar-track {
    background: transparent;
  }
  .popup-list::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 3px;
  }
</style>
</head>
<body>

  <!-- Menu button (fixed top-right) -->
  <button id="menuBtn" class="menu-btn" title="Pages">&#9776;</button>

  <!-- Popup overlay -->
  <div id="popupOverlay" class="popup-overlay">
    <div class="popup-box">
      <div class="popup-title-row">
        <span>Pages</span>
        <button id="popupAddPageBtn" class="popup-add-btn">+ Add File</button>
      </div>
      <div id="popupList" class="popup-list"></div>
    </div>
  </div>

  <div id="app">
    <!-- Main title -->
    <div class="main-title-area">
      <span id="mainTitleDisplay" class="main-title">[Add Title]</span>
      <input id="mainTitleInput" class="main-title-input" style="display:none;" type="text" />
      <button id="editMainTitleBtn" class="icon-btn" title="Edit main title">&#9998;&#65039;</button>
    </div>

    <!-- Accordion list -->
    <div id="accordionList" class="accordion-list"></div>

    <!-- Bottom buttons -->
    <div class="bottom-bar">
      <button id="addAccordionBtn" class="add-btn" title="Add accordion">&#10133;</button>
      <button id="addNoteBtn" class="add-btn" title="Add note">[T]</button>
    </div>
  </div>

<script>
(function() {
  'use strict';

  // ===================================================================
  //  STATE
  // ===================================================================
  let state = {
    pages: [],            // array of page objects
    activePageId: null,   // ID of the currently displayed page
    nextPageId: 1,
    nextAccordionId: 1
  };

  const STORAGE_KEY = 'multiPageAppState';
  let editingMainTitle = false;
  let editingAccordionId = null;
  let popupOpen = false;

  // ===================================================================
  //  HELPERS
  // ===================================================================
  function getActivePage() {
    return state.pages.find(p => p.id === state.activePageId) || null;
  }

  // ===================================================================
  //  DOM REFS
  // ===================================================================
  const mainTitleDisplay  = document.getElementById('mainTitleDisplay');
  const mainTitleInput    = document.getElementById('mainTitleInput');
  const editMainTitleBtn  = document.getElementById('editMainTitleBtn');
  const accordionListEl   = document.getElementById('accordionList');
  const addAccordionBtn   = document.getElementById('addAccordionBtn');
  const addNoteBtn        = document.getElementById('addNoteBtn');
  const menuBtn           = document.getElementById('menuBtn');
  const popupOverlay      = document.getElementById('popupOverlay');
  const popupList         = document.getElementById('popupList');
  const popupAddPageBtn   = document.getElementById('popupAddPageBtn');

  // ===================================================================
  //  PERSISTENCE
  // ===================================================================
  function saveState() {
    const data = {
      activePageId: state.activePageId,
      nextPageId: state.nextPageId,
      nextAccordionId: state.nextAccordionId,
      pages: state.pages.map(p => ({
        id: p.id,
        mainTitle: p.mainTitle,
        accordions: p.accordions.map(a => ({
          id: a.id,
          type: a.type || 'accordion',
          title: a.title,
          body: a.body,
          isOpen: a.isOpen
        }))
      }))
    };
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) { /* silently fail */ }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (!data || typeof data !== 'object') return false;

      state.nextPageId = typeof data.nextPageId === 'number' ? data.nextPageId : 1;
      state.nextAccordionId = typeof data.nextAccordionId === 'number' ? data.nextAccordionId : 1;

      if (Array.isArray(data.pages)) {
        state.pages = data.pages.map(p => ({
          id: p.id,
          mainTitle: typeof p.mainTitle === 'string' ? p.mainTitle : '[Add Title]',
          accordions: (Array.isArray(p.accordions) ? p.accordions : []).map(a => ({
            id: a.id || state.nextAccordionId++,
            type: a.type === 'note' ? 'note' : 'accordion',
            title: typeof a.title === 'string' ? a.title : (a.type === 'note' ? 'Note' : 'Accordion Title'),
            body: typeof a.body === 'string' ? a.body : '',
            isOpen: typeof a.isOpen === 'boolean' ? a.isOpen : false
          }))
        }));
        // fix up IDs to avoid collisions
        state.pages.forEach(p => {
          if (p.id >= state.nextPageId) state.nextPageId = p.id + 1;
          p.accordions.forEach(a => {
            if (a.id >= state.nextAccordionId) state.nextAccordionId = a.id + 1;
          });
        });
      }

      // Restore active page
      if (typeof data.activePageId === 'number' && state.pages.some(p => p.id === data.activePageId)) {
        state.activePageId = data.activePageId;
      } else if (state.pages.length > 0) {
        state.activePageId = state.pages[0].id;
      }
      return state.pages.length > 0;
    } catch (e) {
      return false;
    }
  }

  // ===================================================================
  //  PAGE CRUD
  // ===================================================================
  function createDefaultPage() {
    const id = state.nextPageId++;
    const accordionId = state.nextAccordionId++;
    const page = {
      id: id,
      mainTitle: '[Add Title]',
      accordions: [{
        id: accordionId,
        type: 'accordion',
        title: 'Accordion Title',
        body: '',
        isOpen: false
      }]
    };
    state.pages.push(page);
    return page;
  }

  function addPage() {
    const id = state.nextPageId++;
    const page = {
      id: id,
      mainTitle: 'Untitled Page',
      accordions: []
    };
    state.pages.push(page);
    state.activePageId = id;
    editingMainTitle = false;
    editingAccordionId = null;
    saveState();
    render();
    renderPopup();
    closePopup();
  }

  function deletePage(id) {
    // If this is the last page, replace it with a fresh default
    if (state.pages.length <= 1) {
      state.pages = [];
      state.nextAccordionId = 1;
      const newPage = createDefaultPage();
      state.activePageId = newPage.id;
      saveState();
      render();
      renderPopup();
      return;
    }

    const idx = state.pages.findIndex(p => p.id === id);
    if (idx === -1) return;
    state.pages.splice(idx, 1);

    if (state.activePageId === id) {
      // Switch to the last remaining page
      state.activePageId = state.pages[state.pages.length - 1].id;
    }

    editingMainTitle = false;
    editingAccordionId = null;
    saveState();
    render();
    renderPopup();
  }

  function switchToPage(id) {
    if (id === state.activePageId) return;
    if (!state.pages.some(p => p.id === id)) return;
    state.activePageId = id;
    editingMainTitle = false;
    editingAccordionId = null;
    saveState();
    render();
    renderPopup();
    closePopup();
  }

  // ===================================================================
  //  ACCORDION CRUD (operates on active page)
  // ===================================================================
  function addAccordion(save) {
    const page = getActivePage();
    if (!page) return;
    const id = state.nextAccordionId++;
    page.accordions.push({
      id: id,
      type: 'accordion',
      title: 'Accordion Title',
      body: '',
      isOpen: false
    });
    if (save !== false) saveState();
    render();
  }

  function addNote(save) {
    const page = getActivePage();
    if (!page) return;
    const id = state.nextAccordionId++;
    page.accordions.push({
      id: id,
      type: 'note',
      title: 'Note',
      body: '',
      isOpen: false
    });
    if (save !== false) saveState();
    render();
  }

  function deleteAccordion(id) {
    const page = getActivePage();
    if (!page) return;
    page.accordions = page.accordions.filter(a => a.id !== id);
    if (editingAccordionId === id) editingAccordionId = null;
    saveState();
    render();
  }

  function toggleAccordion(id) {
    const page = getActivePage();
    if (!page) return;
    const acc = page.accordions.find(a => a.id === id);
    if (acc) {
      acc.isOpen = !acc.isOpen;
      saveState();
      render();
    }
  }

  function updateAccordionTitle(id, newTitle) {
    const page = getActivePage();
    if (!page) return;
    const acc = page.accordions.find(a => a.id === id);
    if (acc) {
      acc.title = newTitle;
      saveState();
      render();
    }
  }

  function updateAccordionBody(id, newBody) {
    const page = getActivePage();
    if (!page) return;
    const acc = page.accordions.find(a => a.id === id);
    if (acc) {
      acc.body = newBody;
      saveState();
    }
  }

  function updateMainTitle(newTitle) {
    const page = getActivePage();
    if (!page) return;
    page.mainTitle = newTitle;
    saveState();
    render();
  }

  function autoResizeTextarea(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
  }

  // ===================================================================
  //  RENDER – main content
  // ===================================================================
  function render() {
    const page = getActivePage();

    if (!page) {
      const newPage = createDefaultPage();
      state.activePageId = newPage.id;
      saveState();
      render();
      return;
    }

    // Main title
    if (editingMainTitle) {
      mainTitleDisplay.style.display = 'none';
      mainTitleInput.style.display = '';
      mainTitleInput.value = page.mainTitle;
      mainTitleInput.focus();
      mainTitleInput.select();
    } else {
      mainTitleDisplay.style.display = '';
      mainTitleInput.style.display = 'none';
      mainTitleDisplay.textContent = page.mainTitle || '[Add Title]';
    }

    renderAccordionList(page.accordions);
  }

  function renderAccordionList(accordions) {
    accordionListEl.innerHTML = '';

    if (accordions.length === 0) {
      const emptyMsg = document.createElement('div');
      emptyMsg.className = 'empty-state';
      emptyMsg.textContent = 'No accordions yet. Click the [+] button to add one.';
      accordionListEl.appendChild(emptyMsg);
      return;
    }

    accordions.forEach(acc => {
      const isNote = acc.type === 'note';

      const item = document.createElement('div');
      item.className = 'accordion-item';
      item.dataset.id = acc.id;

      // Header
      const header = document.createElement('div');
      header.className = 'accordion-header' + (acc.isOpen ? ' is-open' : '');
      header.dataset.accordionId = acc.id;

      if (!isNote) {
        const toggleIcon = document.createElement('span');
        toggleIcon.className = 'accordion-toggle-icon';
        toggleIcon.textContent = '\u25B6';
        header.appendChild(toggleIcon);
      }

      const titleSpan = document.createElement('span');
      titleSpan.className = 'accordion-title' + (isNote ? ' is-note' : '');
      titleSpan.textContent = acc.title;

      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.className = 'accordion-title-input' + (isNote ? ' is-note' : '');
      titleInput.value = acc.title;
      titleInput.style.display = 'none';
      titleInput.dataset.accordionId = acc.id;

      const actionsDiv = document.createElement('div');
      actionsDiv.className = 'header-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn';
      editBtn.title = isNote ? 'Edit note' : 'Edit accordion title';
      editBtn.innerHTML = '&#9998;&#65039;';
      editBtn.dataset.accordionId = acc.id;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'icon-btn';
      deleteBtn.title = isNote ? 'Delete note' : 'Delete accordion';
      deleteBtn.innerHTML = '&#128465;&#65039;';
      deleteBtn.dataset.accordionId = acc.id;

      actionsDiv.appendChild(editBtn);
      actionsDiv.appendChild(deleteBtn);

      if (editingAccordionId === acc.id) {
        titleSpan.style.display = 'none';
        titleInput.style.display = '';
      } else {
        titleSpan.style.display = '';
        titleInput.style.display = 'none';
      }
      header.appendChild(titleSpan);
      header.appendChild(titleInput);
      header.appendChild(actionsDiv);
      item.appendChild(header);

      // Body (accordions only)
      if (!isNote) {
        const bodyDiv = document.createElement('div');
        bodyDiv.className = 'accordion-body' + (acc.isOpen ? ' is-open' : '');
        const textarea = document.createElement('textarea');
        textarea.className = 'accordion-body-textarea';
        textarea.value = acc.body;
        textarea.dataset.accordionId = acc.id;
        bodyDiv.appendChild(textarea);
        item.appendChild(bodyDiv);

        textarea.addEventListener('input', function() {
          updateAccordionBody(acc.id, textarea.value);
          autoResizeTextarea(textarea);
        });

        if (acc.isOpen) {
          requestAnimationFrame(function() {
            autoResizeTextarea(textarea);
            textarea.focus();
          });
        }
      }

      accordionListEl.appendChild(item);

      // Event listeners
      header.addEventListener('click', function(e) {
        if (isNote) return;
        if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.header-actions')) return;
        if (editingAccordionId === acc.id) return;
        toggleAccordion(acc.id);
      });

      editBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        startEditingAccordionTitle(acc.id);
      });

      deleteBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (confirm(isNote ? 'Delete this note?' : 'Delete this accordion?')) {
          deleteAccordion(acc.id);
        }
      });

      titleInput.addEventListener('keydown', function(e) {
        e.stopPropagation();
        if (e.key === 'Enter') {
          const val = titleInput.value.trim();
          if (val !== '') updateAccordionTitle(acc.id, val);
          else titleInput.blur();
          editingAccordionId = null;
          render();
        } else if (e.key === 'Escape') {
          editingAccordionId = null;
          render();
        }
      });

      titleInput.addEventListener('blur', function() {
        setTimeout(function() {
          if (editingAccordionId === acc.id) {
            const val = titleInput.value.trim();
            if (val !== '') updateAccordionTitle(acc.id, val);
            editingAccordionId = null;
            render();
          }
        }, 0);
      });
    });
  }

  // ===================================================================
  //  POPUP
  // ===================================================================
  function renderPopup() {
    popupList.innerHTML = '';

    if (state.pages.length === 0) {
      const emptyMsg = document.createElement('div');
      emptyMsg.className = 'popup-empty';
      emptyMsg.textContent = 'No pages.';
      popupList.appendChild(emptyMsg);
      return;
    }

    state.pages.forEach(p => {
      const row = document.createElement('div');
      row.className = 'popup-list-item' + (p.id === state.activePageId ? ' is-active' : '');
      row.dataset.pageId = p.id;

      const titleSpan = document.createElement('span');
      titleSpan.className = 'popup-list-item-title';
      titleSpan.textContent = p.mainTitle || 'Untitled';

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn';
      delBtn.title = 'Delete page';
      delBtn.innerHTML = '&#128465;&#65039;';
      delBtn.dataset.pageId = p.id;

      row.appendChild(titleSpan);
      row.appendChild(delBtn);
      popupList.appendChild(row);

      // Click on title switches to page
      titleSpan.addEventListener('click', function() {
        switchToPage(p.id);
      });

      // Delete button
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (state.pages.length === 1) {
          if (confirm('Delete the last page? A new default page will be created.')) {
            deletePage(p.id);
          }
        } else {
          if (confirm('Delete this page?')) {
            deletePage(p.id);
          }
        }
      });
    });
  }

  function openPopup() {
    if (popupOpen) return;
    popupOpen = true;
    renderPopup();
    popupOverlay.classList.add('is-open');
  }

  function closePopup() {
    if (!popupOpen) return;
    popupOpen = false;
    popupOverlay.classList.remove('is-open');
  }

  // ===================================================================
  //  EDITING ACCORDION TITLE
  // ===================================================================
  function startEditingAccordionTitle(id) {
    if (editingMainTitle) return;
    editingAccordionId = id;
    render();
    requestAnimationFrame(function() {
      const input = document.querySelector('.accordion-title-input[data-accordion-id="' + id + '"]');
      if (input) { input.focus(); input.select(); }
    });
  }

  // ===================================================================
  //  MAIN TITLE EDITING
  // ===================================================================
  function startEditingMainTitle() {
    if (editingAccordionId !== null) return;
    editingMainTitle = true;
    render();
  }

  function finishEditingMainTitle(save) {
    if (!editingMainTitle) return;
    const val = mainTitleInput.value.trim();
    if (save && val !== '') updateMainTitle(val);
    editingMainTitle = false;
    render();
    // Update popup list if open so page name refreshes in real time
    if (popupOpen) renderPopup();
  }

  // ===================================================================
  //  EVENT LISTENERS
  // ===================================================================

  // Main title
  editMainTitleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (editingMainTitle) finishEditingMainTitle(true);
    else startEditingMainTitle();
  });

  mainTitleInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); finishEditingMainTitle(true); }
    else if (e.key === 'Escape') { finishEditingMainTitle(false); }
  });

  mainTitleInput.addEventListener('blur', function() {
    setTimeout(function() {
      if (editingMainTitle) finishEditingMainTitle(true);
    }, 0);
  });

  // Add accordion / note
  addAccordionBtn.addEventListener('click', function() { addAccordion(true); });
  addNoteBtn.addEventListener('click', function() { addNote(true); });

  // Menu button
  menuBtn.addEventListener('click', function() {
    if (popupOpen) closePopup();
    else openPopup();
  });

  // Popup: close on overlay click (outside the box)
  popupOverlay.addEventListener('click', function(e) {
    if (e.target === popupOverlay) closePopup();
  });

  // Popup: close on Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && popupOpen) closePopup();
  });

  // Add page from popup
  popupAddPageBtn.addEventListener('click', function() {
    addPage();
  });

  // ===================================================================
  //  INIT
  // ===================================================================
  function init() {
    const loaded = loadState();
    if (!loaded) {
      // First time: create a single default page
      state.pages = [];
      state.nextAccordionId = 1;
      const page = createDefaultPage();
      state.activePageId = page.id;
      saveState();
    }
    render();
    // Ensure popup is closed on load
    popupOpen = false;
    popupOverlay.classList.remove('is-open');
  }

  init();

})();
</script>
 <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>
</body>
</html>
